# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path pathposts to be prepended to sys.path and in which order
# prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to copy to slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported that are
# not part of the active version directory
# (e.g. models in another project or subproject)
# version_locations =

# version path separator; defaults to os.pathsep.
# Use ';' for Windows and ':' for Unix
# version_path_separator = ;

# set to 'true' to search for locations recursively
# recursive_version_locations = false

# output encoding
# output_encoding = utf-8

# sqlalchemy.url is set dynamically in alembic/env.py from the .env file.
sqlalchemy.url = postgresql://user:pass@localhost/dbname

[post_write_hooks]
# post_write_hooks defines scripts or behavior that is run after a
# revision is generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
